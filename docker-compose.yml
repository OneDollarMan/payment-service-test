services:
  payment-service-app:
    build: ./app
    command: uvicorn src.main:app --host 0.0.0.0 --reload --port 8000
    container_name: payment-service-app
    volumes:
      - ./app:/app
    env_file: ".env.dev"
    ports:
      - "8000:8000"
    depends_on:
      payment-service-db:
        condition: service_started

  payment-service-producer:
    build: ./app
    command: faststream run src.runners.outbox_publisher_runner:runner
    container_name: payment-service-producer
    volumes:
      - ./app:/app
    env_file: ".env.dev"
    depends_on:
      payment-service-db:
        condition: service_started
      payment-service-rabbitmq:
        condition: service_healthy

  payment-service-consumer:
    build: ./app
    command: faststream run src.runners.payment_consumer_runner:runner
    container_name: payment-service-consumer
    volumes:
      - ./app:/app
    env_file: ".env.dev"
    depends_on:
      payment-service-db:
        condition: service_started
      payment-service-rabbitmq:
        condition: service_healthy

  payment-service-db:
    image: postgres:latest
    container_name: payment-service-db
    ports:
      - "5432:5432"
    env_file: ".env.dev"
    volumes:
      - db-volume:/var/lib/postgresql

  payment-service-rabbitmq:
    image: rabbitmq:latest
    container_name: payment-service-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    env_file: ".env.dev"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 5s

volumes:
  db-volume:
